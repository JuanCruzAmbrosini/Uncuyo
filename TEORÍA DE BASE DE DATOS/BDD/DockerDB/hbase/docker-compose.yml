services:
  hbase:
    image: openeuler/hbase:latest
    container_name: hbase
    hostname: hbase
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "printf '#!/bin/sh\necho $${HOSTNAME:-hbase}\n' > /tmp/hostname && chmod +x /tmp/hostname && export PATH=/tmp:$$PATH && /usr/local/hbase/bin/start-hbase.sh && while true; do sleep 3600; done"
    ports:
      - "2181:2181"
      - "16000:16000"
      - "16010:16010"
      - "16020:16020"
      - "16030:16030"
    volumes:
      - hbase_data:/usr/local/hbase/tmp
      - ./hbase-site.xml:/usr/local/hbase/conf/hbase-site.xml:ro
      - ./scripts:/usr/local/hbase/scripts:ro
      - ./:/workspace:ro
volumes:
  hbase_data:
